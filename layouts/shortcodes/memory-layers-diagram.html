<div style="overflow-x: auto; margin: 1.5rem 0;">
<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Claude Code 四层记忆架构图</title>
  <desc>从外到内依次是企业全局层（~/.claude/CLAUDE.md，永久，所有项目）、项目层（./CLAUDE.md，永久，随 git 提交）、子目录层（./src/CLAUDE.md，永久，局部覆盖）、会话层（对话历史，临时）。右侧标注优先级轴：内层高于外层。</desc>
  <defs>
    <style>
      .ml-th { font-family: system-ui,sans-serif; font-size: 14px; font-weight: 500; }
      .ml-ts { font-family: system-ui,sans-serif; font-size: 12px; }
      .ml-code { font-family: monospace; font-size: 11px; }
      .ml-badge { font-family: system-ui,sans-serif; font-size: 11px; font-weight: 600; }
      .ml-axis { font-family: system-ui,sans-serif; font-size: 11px; }

      /* layer fills */
      .l1-fill { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; }
      .l2-fill { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
      .l3-fill { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.5; }
      .l4-fill { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }

      /* text */
      .l1-t { fill: #444441; } .l1-s { fill: #5F5E5A; }
      .l2-t { fill: #085041; } .l2-s { fill: #0F6E56; }
      .l3-t { fill: #3C3489; } .l3-s { fill: #534AB7; }
      .l4-t { fill: #633806; } .l4-s { fill: #854F0B; }

      /* badges */
      .b-perm { fill: #EAF3DE; } .b-perm-t { fill: #27500A; }
      .b-temp { fill: #FCEBEB; } .b-temp-t { fill: #791F1F; }

      /* axis */
      .axis-line { stroke: #B4B2A9; stroke-width: 1; fill: none; }
      .axis-text { fill: #888780; }

      @media (prefers-color-scheme: dark) {
        .l1-fill { fill: #2C2C2A; stroke: #5F5E5A; }
        .l2-fill { fill: #04342C; stroke: #1D9E75; }
        .l3-fill { fill: #26215C; stroke: #7F77DD; }
        .l4-fill { fill: #412402; stroke: #BA7517; }
        .l1-t { fill: #D3D1C7; } .l1-s { fill: #B4B2A9; }
        .l2-t { fill: #9FE1CB; } .l2-s { fill: #5DCAA5; }
        .l3-t { fill: #CECBF6; } .l3-s { fill: #AFA9EC; }
        .l4-t { fill: #FAC775; } .l4-s { fill: #EF9F27; }
        .b-perm { fill: #052E16; } .b-perm-t { fill: #86EFAC; }
        .b-temp { fill: #4C0519; } .b-temp-t { fill: #FCA5A5; }
        .axis-line { stroke: #4B5563; }
        .axis-text { fill: #6B7280; }
      }
    </style>
    <marker id="arr-up" viewBox="0 0 10 10" refX="5" refY="2"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 8 L5 2 L9 8" fill="none" stroke="#B4B2A9" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Layer 1: Enterprise / global -->
  <rect x="30" y="20" width="560" height="380" rx="20" class="l1-fill"/>
  <text x="58" y="52" dominant-baseline="central" class="ml-th l1-t">企业 / 全局层</text>
  <text x="58" y="70" dominant-baseline="central" class="ml-code l1-s">~/.claude/CLAUDE.md</text>
  <rect x="58" y="78" width="56" height="18" rx="4" class="b-perm"/>
  <text x="86" y="87" text-anchor="middle" dominant-baseline="central" class="ml-badge b-perm-t">永久</text>
  <text x="122" y="87" dominant-baseline="central" class="ml-ts l1-s">· 当前用户所有项目共享</text>

  <!-- Layer 2: Project root -->
  <rect x="68" y="108" width="484" height="272" rx="16" class="l2-fill"/>
  <text x="94" y="138" dominant-baseline="central" class="ml-th l2-t">项目层</text>
  <text x="94" y="156" dominant-baseline="central" class="ml-code l2-s">./CLAUDE.md</text>
  <rect x="94" y="164" width="56" height="18" rx="4" class="b-perm"/>
  <text x="122" y="173" text-anchor="middle" dominant-baseline="central" class="ml-badge b-perm-t">永久</text>
  <text x="158" y="173" dominant-baseline="central" class="ml-ts l2-s">· 随 git 提交，团队共享</text>

  <!-- Layer 3: Sub-directory -->
  <rect x="108" y="196" width="404" height="160" rx="12" class="l3-fill"/>
  <text x="132" y="224" dominant-baseline="central" class="ml-th l3-t">子目录层</text>
  <text x="132" y="242" dominant-baseline="central" class="ml-code l3-s">./src/CLAUDE.md</text>
  <rect x="132" y="250" width="56" height="18" rx="4" class="b-perm"/>
  <text x="160" y="259" text-anchor="middle" dominant-baseline="central" class="ml-badge b-perm-t">永久</text>
  <text x="196" y="259" dominant-baseline="central" class="ml-ts l3-s">· 局部覆盖，模块级约定</text>

  <!-- Layer 4: Session (innermost) -->
  <rect x="148" y="284" width="324" height="56" rx="10" class="l4-fill"/>
  <text x="310" y="308" text-anchor="middle" dominant-baseline="central" class="ml-th l4-t">会话层</text>
  <text x="310" y="326" text-anchor="middle" dominant-baseline="central" class="ml-code l4-s">对话历史（内存）</text>
  <rect x="464" y="293" width="56" height="18" rx="4" class="b-temp"/>
  <text x="492" y="302" text-anchor="middle" dominant-baseline="central" class="ml-badge b-temp-t">临时</text>

  <!-- Priority axis (right) -->
  <line x1="618" y1="380" x2="618" y2="40" class="axis-line" marker-end="url(#arr-up)"/>
  <text x="636" y="385" dominant-baseline="central" class="ml-axis axis-text">低</text>
  <text x="636" y="42"  dominant-baseline="central" class="ml-axis axis-text">高</text>
  <text x="650" y="212" text-anchor="middle" dominant-baseline="central"
        class="ml-axis axis-text" transform="rotate(90,650,212)">优先级</text>
</svg>
</div>
