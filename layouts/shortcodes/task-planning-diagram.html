<div style="overflow-x: auto; margin: 1.5rem 0;">
<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>任务规划与执行流程图</title>
  <desc>展示 Claude Code 处理用户任务的完整路径：接收任务、复杂度判断、任务分解、并行子任务、歧义处理、错误恢复、汇总输出。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .flow-text { font-family: system-ui, sans-serif; font-size: 13px; fill: #374151; }
      .flow-text-sm { font-family: system-ui, sans-serif; font-size: 11px; fill: #6B7280; }
      .flow-line { stroke: #9CA3AF; stroke-width: 1; fill: none; marker-end: url(#arrow); }
      .box-gray { fill: #F3F4F6; stroke: #D1D5DB; stroke-width: 0.5; }
      .box-teal { fill: #ECFDF5; stroke: #6EE7B7; stroke-width: 0.5; }
      .box-purple { fill: #F5F3FF; stroke: #C4B5FD; stroke-width: 0.5; }
      .box-amber { fill: #FFFBEB; stroke: #FCD34D; stroke-width: 0.5; }
      .box-coral { fill: #FFF7ED; stroke: #FDBA74; stroke-width: 0.5; }
      @media (prefers-color-scheme: dark) {
        .flow-text { fill: #E5E7EB; }
        .flow-text-sm { fill: #9CA3AF; }
        .flow-line { stroke: #6B7280; }
        .box-gray { fill: #374151; stroke: #4B5563; }
        .box-teal { fill: #064E3B; stroke: #065F46; }
        .box-purple { fill: #3B0764; stroke: #4C1D95; }
        .box-amber { fill: #451A03; stroke: #78350F; }
        .box-coral { fill: #431407; stroke: #7C2D12; }
      }
    </style>
  </defs>

  <!-- 用户任务 -->
  <rect x="260" y="20" width="160" height="40" rx="20" class="box-gray"/>
  <text x="340" y="44" text-anchor="middle" class="flow-text" font-weight="500">用户任务</text>

  <line x1="340" y1="60" x2="340" y2="92" class="flow-line"/>

  <!-- 复杂度判断 diamond -->
  <polygon points="340,92 385,114 340,136 295,114" fill="none" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="340" y="118" text-anchor="middle" class="flow-text-sm">复杂度？</text>

  <!-- 简单 → 直接执行 -->
  <line x1="385" y1="114" x2="490" y2="114" class="flow-line"/>
  <text x="435" y="108" text-anchor="middle" class="flow-text-sm">简单</text>
  <rect x="490" y="94" width="130" height="40" rx="8" class="box-teal"/>
  <text x="555" y="118" text-anchor="middle" class="flow-text" font-weight="500">直接执行</text>

  <!-- 复杂 → 任务分解 -->
  <line x1="340" y1="136" x2="340" y2="166" class="flow-line"/>
  <text x="352" y="154" class="flow-text-sm">复杂</text>
  <rect x="220" y="166" width="240" height="44" rx="8" class="box-purple"/>
  <text x="340" y="183" text-anchor="middle" class="flow-text" font-weight="500">任务分解</text>
  <text x="340" y="199" text-anchor="middle" class="flow-text-sm">拆分为有依赖关系的子任务</text>

  <!-- 子任务并行 -->
  <line x1="340" y1="210" x2="340" y2="238" class="flow-line"/>
  <line x1="130" y1="238" x2="550" y2="238" stroke="#9CA3AF" stroke-width="0.5" fill="none"/>
  <line x1="130" y1="238" x2="130" y2="256" class="flow-line"/>
  <line x1="340" y1="238" x2="340" y2="256" class="flow-line"/>
  <line x1="550" y1="238" x2="550" y2="256" class="flow-line"/>

  <rect x="60"  y="256" width="140" height="40" rx="8" class="box-teal"/>
  <text x="130" y="270" text-anchor="middle" class="flow-text" font-weight="500">子任务 A</text>
  <text x="130" y="286" text-anchor="middle" class="flow-text-sm">Task 工具并行</text>

  <rect x="270" y="256" width="140" height="40" rx="8" class="box-teal"/>
  <text x="340" y="270" text-anchor="middle" class="flow-text" font-weight="500">子任务 B</text>
  <text x="340" y="286" text-anchor="middle" class="flow-text-sm">Task 工具并行</text>

  <rect x="480" y="256" width="140" height="40" rx="8" class="box-teal"/>
  <text x="550" y="270" text-anchor="middle" class="flow-text" font-weight="500">子任务 C</text>
  <text x="550" y="286" text-anchor="middle" class="flow-text-sm">Task 工具并行</text>

  <!-- 歧义/错误判断 -->
  <line x1="340" y1="296" x2="340" y2="320" class="flow-line"/>
  <polygon points="340,320 378,338 340,356 302,338" fill="none" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="340" y="342" text-anchor="middle" class="flow-text-sm">遇到问题？</text>

  <!-- 歧义 → 询问用户 -->
  <line x1="302" y1="338" x2="200" y2="338" class="flow-line"/>
  <text x="252" y="330" text-anchor="middle" class="flow-text-sm">歧义</text>
  <rect x="90" y="318" width="110" height="40" rx="8" class="box-amber"/>
  <text x="145" y="332" text-anchor="middle" class="flow-text" font-weight="500">询问用户</text>
  <text x="145" y="348" text-anchor="middle" class="flow-text-sm">澄清后继续</text>

  <!-- 错误 → 错误恢复 -->
  <line x1="378" y1="338" x2="478" y2="338" class="flow-line"/>
  <text x="426" y="330" text-anchor="middle" class="flow-text-sm">报错</text>
  <rect x="478" y="318" width="110" height="40" rx="8" class="box-coral"/>
  <text x="533" y="332" text-anchor="middle" class="flow-text" font-weight="500">错误恢复</text>
  <text x="533" y="348" text-anchor="middle" class="flow-text-sm">重试 / 调整策略</text>

  <!-- 完成 → 汇总输出 -->
  <line x1="340" y1="356" x2="340" y2="384" class="flow-line"/>
  <text x="354" y="373" class="flow-text-sm">完成</text>
  <rect x="240" y="384" width="200" height="28" rx="14" class="box-gray"/>
  <text x="340" y="402" text-anchor="middle" class="flow-text" font-weight="500">汇总输出</text>

  <!-- 直接执行也接入输出 -->
  <path d="M555 134 L555 400 L440 400" stroke="#9CA3AF" stroke-width="0.5"
        stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
</svg>
</div>
