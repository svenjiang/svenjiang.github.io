<div style="overflow-x: auto; margin: 1.5rem 0;">
<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Human-in-the-Loop 交互点设计图</title>
  <desc>Claude Code 在三类场景下触发人类介入：不可逆操作前的强制确认、歧义任务的主动澄清、以及阶段性进度汇报。左侧为触发类型，中间为 Agent 执行流，右侧为用户响应节点，虚线表示用户决策反馈回流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .hitl-th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
      .hitl-ts { font-family: system-ui, sans-serif; font-size: 12px; }
      .hitl-sub { font-family: system-ui, sans-serif; font-size: 12px; }
      .hitl-footer { font-family: system-ui, sans-serif; font-size: 11px; }
      .box-gray   { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; }
      .box-coral  { fill: #FAECE7; stroke: #D85A30; stroke-width: 0.5; }
      .box-amber  { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }
      .box-teal   { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
      .box-purple { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.5; }
      .text-gray   { fill: #444441; }
      .text-coral  { fill: #712B13; }
      .text-amber  { fill: #633806; }
      .text-teal   { fill: #085041; }
      .text-purple { fill: #3C3489; }
      .text-sub-gray   { fill: #5F5E5A; }
      .text-sub-coral  { fill: #993C1D; }
      .text-sub-amber  { fill: #854F0B; }
      .text-sub-teal   { fill: #0F6E56; }
      .text-sub-purple { fill: #534AB7; }
      .conn { stroke: #888780; stroke-width: 1; fill: none; }
      .conn-dash { stroke: #888780; stroke-width: 0.8; fill: none; stroke-dasharray: 4 3; }
      .dot { fill: #888780; }
      .footer-text { fill: #888780; }
      @media (prefers-color-scheme: dark) {
        .box-gray   { fill: #2C2C2A; stroke: #5F5E5A; }
        .box-coral  { fill: #4A1B0C; stroke: #D85A30; }
        .box-amber  { fill: #412402; stroke: #BA7517; }
        .box-teal   { fill: #04342C; stroke: #1D9E75; }
        .box-purple { fill: #26215C; stroke: #7F77DD; }
        .text-gray   { fill: #D3D1C7; }
        .text-coral  { fill: #F5C4B3; }
        .text-amber  { fill: #FAC775; }
        .text-teal   { fill: #9FE1CB; }
        .text-purple { fill: #CECBF6; }
        .text-sub-gray   { fill: #B4B2A9; }
        .text-sub-coral  { fill: #F0997B; }
        .text-sub-amber  { fill: #EF9F27; }
        .text-sub-teal   { fill: #5DCAA5; }
        .text-sub-purple { fill: #AFA9EC; }
        .conn { stroke: #6B7280; }
        .conn-dash { stroke: #6B7280; }
        .dot { fill: #6B7280; }
        .footer-text { fill: #6B7280; }
      }
    </style>
  </defs>

  <!-- Central Agent strip -->
  <rect x="260" y="20" width="160" height="320" rx="12" class="box-gray"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central" class="hitl-th text-gray">Agent 执行流</text>

  <!-- Step dots -->
  <circle cx="340" cy="100" r="5" class="dot"/>
  <circle cx="340" cy="180" r="5" class="dot"/>
  <circle cx="340" cy="260" r="5" class="dot"/>

  <!-- Left: Type 1 – Forced confirm -->
  <rect x="40" y="76" width="180" height="48" rx="8" class="box-coral"/>
  <text x="130" y="96" text-anchor="middle" dominant-baseline="central" class="hitl-th text-coral">强制确认</text>
  <text x="130" y="113" text-anchor="middle" dominant-baseline="central" class="hitl-sub text-sub-coral">不可逆操作前暂停</text>
  <line x1="220" y1="100" x2="258" y2="100" class="conn" marker-end="url(#arrow)"/>

  <!-- Left: Type 2 – Ambiguity clarify -->
  <rect x="40" y="156" width="180" height="48" rx="8" class="box-amber"/>
  <text x="130" y="176" text-anchor="middle" dominant-baseline="central" class="hitl-th text-amber">主动澄清</text>
  <text x="130" y="193" text-anchor="middle" dominant-baseline="central" class="hitl-sub text-sub-amber">需求歧义时提问</text>
  <line x1="220" y1="180" x2="258" y2="180" class="conn" marker-end="url(#arrow)"/>

  <!-- Left: Type 3 – Progress report -->
  <rect x="40" y="236" width="180" height="48" rx="8" class="box-teal"/>
  <text x="130" y="256" text-anchor="middle" dominant-baseline="central" class="hitl-th text-teal">进度汇报</text>
  <text x="130" y="273" text-anchor="middle" dominant-baseline="central" class="hitl-sub text-sub-teal">阶段完成后告知</text>
  <line x1="220" y1="260" x2="258" y2="260" class="conn" marker-end="url(#arrow)"/>

  <!-- Right: User decision nodes -->
  <rect x="460" y="76" width="180" height="48" rx="8" class="box-purple"/>
  <text x="550" y="96" text-anchor="middle" dominant-baseline="central" class="hitl-th text-purple">用户决策</text>
  <text x="550" y="113" text-anchor="middle" dominant-baseline="central" class="hitl-sub text-sub-purple">确认 / 取消 / 修改</text>
  <line x1="420" y1="100" x2="458" y2="100" class="conn" marker-end="url(#arrow)"/>

  <rect x="460" y="156" width="180" height="48" rx="8" class="box-purple"/>
  <text x="550" y="176" text-anchor="middle" dominant-baseline="central" class="hitl-th text-purple">用户回复</text>
  <text x="550" y="193" text-anchor="middle" dominant-baseline="central" class="hitl-sub text-sub-purple">提供约束或偏好</text>
  <line x1="420" y1="180" x2="458" y2="180" class="conn" marker-end="url(#arrow)"/>

  <rect x="460" y="236" width="180" height="48" rx="8" class="box-purple"/>
  <text x="550" y="256" text-anchor="middle" dominant-baseline="central" class="hitl-th text-purple">用户确认</text>
  <text x="550" y="273" text-anchor="middle" dominant-baseline="central" class="hitl-sub text-sub-purple">继续 / 调整方向</text>
  <line x1="420" y1="260" x2="458" y2="260" class="conn" marker-end="url(#arrow)"/>

  <!-- Return dashed arrows back into Agent -->
  <path d="M550 124 L550 148 L340 148 L340 155" class="conn-dash" marker-end="url(#arrow)"/>
  <path d="M550 204 L550 226 L340 226 L340 235" class="conn-dash" marker-end="url(#arrow)"/>

  <!-- Footer label -->
  <text x="340" y="350" text-anchor="middle" dominant-baseline="central" class="hitl-footer footer-text">← 三类交互点覆盖 Agent 执行的全生命周期 →</text>
</svg>
</div>
