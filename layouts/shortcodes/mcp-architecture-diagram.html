<div style="overflow-x: auto; margin: 1.5rem 0;">
<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>MCP 架构图</title>
  <desc>Model Context Protocol 架构：左侧 Claude Code 作为 MCP Client，中间为 MCP 协议层（Tools / Resources / Prompts），右侧为多个 MCP Server（GitHub、数据库、浏览器、自定义内部 API），支持 stdio 本地进程和 SSE 远程两种传输方式。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .mcp-th { font-family: system-ui,sans-serif; font-size: 14px; font-weight: 500; }
      .mcp-ts { font-family: system-ui,sans-serif; font-size: 12px; }
      .mcp-tag { font-family: system-ui,sans-serif; font-size: 11px; font-weight: 500; }
      /* color fills */
      .b-purple { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.5; }
      .b-teal   { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
      .b-amber  { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }
      .b-coral  { fill: #FAECE7; stroke: #D85A30; stroke-width: 0.5; }
      .b-gray   { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; }
      .b-blue   { fill: #E6F1FB; stroke: #378ADD; stroke-width: 0.5; }
      /* text */
      .t-purple { fill: #3C3489; } .ts-purple { fill: #534AB7; }
      .t-teal   { fill: #085041; } .ts-teal   { fill: #0F6E56; }
      .t-amber  { fill: #633806; } .ts-amber  { fill: #854F0B; }
      .t-coral  { fill: #712B13; } .ts-coral  { fill: #993C1D; }
      .t-gray   { fill: #444441; } .ts-gray   { fill: #5F5E5A; }
      .t-blue   { fill: #0C447C; } .ts-blue   { fill: #185FA5; }
      /* connector */
      .conn { stroke: #888780; stroke-width: 1; fill: none; }
      .conn-dash { stroke: #888780; stroke-width: 0.8; stroke-dasharray: 5 3; fill: none; }
      .transport-label { font-family: system-ui,sans-serif; font-size: 11px; fill: #888780; }
      @media (prefers-color-scheme: dark) {
        .b-purple { fill: #26215C; stroke: #7F77DD; }
        .b-teal   { fill: #04342C; stroke: #1D9E75; }
        .b-amber  { fill: #412402; stroke: #BA7517; }
        .b-coral  { fill: #4A1B0C; stroke: #D85A30; }
        .b-gray   { fill: #2C2C2A; stroke: #5F5E5A; }
        .b-blue   { fill: #042C53; stroke: #378ADD; }
        .t-purple { fill: #CECBF6; } .ts-purple { fill: #AFA9EC; }
        .t-teal   { fill: #9FE1CB; } .ts-teal   { fill: #5DCAA5; }
        .t-amber  { fill: #FAC775; } .ts-amber  { fill: #EF9F27; }
        .t-coral  { fill: #F5C4B3; } .ts-coral  { fill: #F0997B; }
        .t-gray   { fill: #D3D1C7; } .ts-gray   { fill: #B4B2A9; }
        .t-blue   { fill: #B5D4F4; } .ts-blue   { fill: #85B7EB; }
        .conn { stroke: #6B7280; }
        .conn-dash { stroke: #6B7280; }
        .transport-label { fill: #6B7280; }
      }
    </style>
  </defs>

  <!-- ── Claude Code Client (left) ── -->
  <rect x="30" y="100" width="150" height="180" rx="14" class="b-purple"/>
  <text x="105" y="130" text-anchor="middle" dominant-baseline="central" class="mcp-th t-purple">Claude Code</text>
  <text x="105" y="150" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-purple">MCP Client</text>
  <!-- inner items -->
  <rect x="48" y="165" width="114" height="26" rx="5" class="b-gray"/>
  <text x="105" y="178" text-anchor="middle" dominant-baseline="central" class="mcp-ts t-gray">ReAct 循环</text>
  <rect x="48" y="198" width="114" height="26" rx="5" class="b-gray"/>
  <text x="105" y="211" text-anchor="middle" dominant-baseline="central" class="mcp-ts t-gray">内置工具集</text>
  <rect x="48" y="231" width="114" height="26" rx="5" class="b-gray"/>
  <text x="105" y="244" text-anchor="middle" dominant-baseline="central" class="mcp-ts t-gray">MCP 工具集（动态）</text>

  <!-- ── Protocol layer (center) ── -->
  <rect x="248" y="60" width="184" height="260" rx="14" class="b-teal"/>
  <text x="340" y="90" text-anchor="middle" dominant-baseline="central" class="mcp-th t-teal">MCP 协议层</text>
  <!-- protocol concepts -->
  <rect x="264" y="110" width="152" height="44" rx="8" class="b-gray"/>
  <text x="340" y="128" text-anchor="middle" dominant-baseline="central" class="mcp-ts t-gray" font-weight="500">Tools</text>
  <text x="340" y="145" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-gray">可调用函数声明</text>

  <rect x="264" y="164" width="152" height="44" rx="8" class="b-gray"/>
  <text x="340" y="182" text-anchor="middle" dominant-baseline="central" class="mcp-ts t-gray" font-weight="500">Resources</text>
  <text x="340" y="199" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-gray">可读取数据资源</text>

  <rect x="264" y="218" width="152" height="44" rx="8" class="b-gray"/>
  <text x="340" y="236" text-anchor="middle" dominant-baseline="central" class="mcp-ts t-gray" font-weight="500">Prompts</text>
  <text x="340" y="253" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-gray">预定义提示模板</text>

  <!-- transport badges -->
  <rect x="264" y="280" width="68" height="22" rx="4" class="b-amber"/>
  <text x="298" y="291" text-anchor="middle" dominant-baseline="central" class="mcp-tag t-amber">stdio</text>
  <rect x="344" y="280" width="72" height="22" rx="4" class="b-blue"/>
  <text x="380" y="291" text-anchor="middle" dominant-baseline="central" class="mcp-tag t-blue">SSE / HTTP</text>

  <!-- ── Arrows Client ↔ Protocol ── -->
  <line x1="180" y1="175" x2="246" y2="175" class="conn" marker-end="url(#arrow)"/>
  <line x1="246" y1="205" x2="180" y2="205" class="conn" marker-end="url(#arrow)"/>
  <text x="213" y="168" text-anchor="middle" class="transport-label">调用</text>
  <text x="213" y="218" text-anchor="middle" class="transport-label">结果</text>

  <!-- ── MCP Servers (right) ── -->
  <!-- GitHub -->
  <rect x="470" y="30" width="180" height="56" rx="10" class="b-gray"/>
  <text x="560" y="52" text-anchor="middle" dominant-baseline="central" class="mcp-th t-gray">GitHub</text>
  <text x="560" y="70" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-gray">PR / Issues / 代码搜索</text>

  <!-- Database -->
  <rect x="470" y="104" width="180" height="56" rx="10" class="b-gray"/>
  <text x="560" y="126" text-anchor="middle" dominant-baseline="central" class="mcp-th t-gray">数据库</text>
  <text x="560" y="144" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-gray">PostgreSQL / SQLite</text>

  <!-- Browser -->
  <rect x="470" y="178" width="180" height="56" rx="10" class="b-gray"/>
  <text x="560" y="200" text-anchor="middle" dominant-baseline="central" class="mcp-th t-gray">浏览器自动化</text>
  <text x="560" y="218" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-gray">Puppeteer / Playwright</text>

  <!-- Custom -->
  <rect x="470" y="252" width="180" height="56" rx="10" class="b-coral"/>
  <text x="560" y="274" text-anchor="middle" dominant-baseline="central" class="mcp-th t-coral">自定义 Server</text>
  <text x="560" y="292" text-anchor="middle" dominant-baseline="central" class="mcp-ts ts-coral">内部 API / 私有工具</text>

  <!-- Arrows Protocol → Servers -->
  <line x1="432" y1="130" x2="468" y2="58"  class="conn" marker-end="url(#arrow)"/>
  <line x1="432" y1="160" x2="468" y2="132" class="conn" marker-end="url(#arrow)"/>
  <line x1="432" y1="190" x2="468" y2="206" class="conn" marker-end="url(#arrow)"/>
  <line x1="432" y1="220" x2="468" y2="280" class="conn" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="340" y="360" text-anchor="middle" class="transport-label">任何支持 MCP 协议的 Agent 均可复用同一套 Server</text>
</svg>
</div>
