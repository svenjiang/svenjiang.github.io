<div style="overflow-x: auto; margin: 1.5rem 0;">
<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Claude Code 权限分级架构图</title>
  <desc>三层嵌套权限结构：最外层读取操作（绿色，默认允许），中间层写入操作（橙色，需确认），最内层执行操作（红色，最高风险），右侧为用户授权节点，底部说明 MCP 扩展权限原则。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .perm-th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
      .perm-ts { font-family: system-ui, sans-serif; font-size: 12px; }
      .layer-teal-fill  { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
      .layer-amber-fill { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }
      .layer-coral-fill { fill: #FAECE7; stroke: #D85A30; stroke-width: 0.5; }
      .layer-purple-fill { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.5; }
      .layer-teal-text  { fill: #085041; }
      .layer-teal-sub   { fill: #0F6E56; }
      .layer-amber-text { fill: #633806; }
      .layer-amber-sub  { fill: #854F0B; }
      .layer-coral-text { fill: #712B13; }
      .layer-coral-sub  { fill: #993C1D; }
      .layer-purple-text { fill: #3C3489; }
      .layer-purple-sub  { fill: #534AB7; }
      .conn-line { stroke: #888780; stroke-width: 1; fill: none; }
      .sub-text { font-family: system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        .layer-teal-fill  { fill: #04342C; stroke: #1D9E75; }
        .layer-amber-fill { fill: #412402; stroke: #BA7517; }
        .layer-coral-fill { fill: #4A1B0C; stroke: #D85A30; }
        .layer-purple-fill { fill: #26215C; stroke: #7F77DD; }
        .layer-teal-text  { fill: #9FE1CB; }
        .layer-teal-sub   { fill: #5DCAA5; }
        .layer-amber-text { fill: #FAC775; }
        .layer-amber-sub  { fill: #EF9F27; }
        .layer-coral-text { fill: #F5C4B3; }
        .layer-coral-sub  { fill: #F0997B; }
        .layer-purple-text { fill: #CECBF6; }
        .layer-purple-sub  { fill: #AFA9EC; }
        .conn-line { stroke: #B4B2A9; }
        .sub-text { fill: #B4B2A9; }
      }
    </style>
  </defs>

  <!-- Layer 1: Read -->
  <rect x="40" y="20" width="480" height="300" rx="18" class="layer-teal-fill"/>
  <text x="66" y="50" class="perm-th layer-teal-text" dominant-baseline="central">读取操作</text>
  <text x="66" y="68" class="perm-ts layer-teal-sub" dominant-baseline="central">默认允许，无需确认</text>

  <!-- Layer 2: Write -->
  <rect x="80" y="80" width="400" height="200" rx="14" class="layer-amber-fill"/>
  <text x="106" y="108" class="perm-th layer-amber-text" dominant-baseline="central">写入操作</text>
  <text x="106" y="126" class="perm-ts layer-amber-sub" dominant-baseline="central">按配置确认，可批量授权</text>

  <!-- Layer 3: Execute -->
  <rect x="120" y="148" width="320" height="108" rx="10" class="layer-coral-fill"/>
  <text x="280" y="185" text-anchor="middle" class="perm-th layer-coral-text" dominant-baseline="central">执行操作（Bash）</text>
  <text x="280" y="203" text-anchor="middle" class="perm-ts layer-coral-sub" dominant-baseline="central">不可逆命令需二次确认</text>
  <text x="280" y="219" text-anchor="middle" class="perm-ts layer-coral-sub" dominant-baseline="central">外部调用 / 删除 / 部署</text>

  <!-- User auth node -->
  <rect x="558" y="138" width="102" height="56" rx="10" class="layer-purple-fill"/>
  <text x="609" y="160" text-anchor="middle" class="perm-th layer-purple-text" dominant-baseline="central">用户授权</text>
  <text x="609" y="178" text-anchor="middle" class="perm-ts layer-purple-sub" dominant-baseline="central">Permission 控制</text>
  <line x1="558" y1="166" x2="523" y2="200" class="conn-line" marker-end="url(#arrow)"/>

  <!-- MCP note -->
  <text x="280" y="340" text-anchor="middle" class="sub-text">MCP 扩展权限由各 server 单独声明，遵循最小必要原则</text>
</svg>
</div>
